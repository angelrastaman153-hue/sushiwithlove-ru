<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!--
    viewport: maximum-scale=1 — запрещаем автозум на iOS при фокусе на input
    viewport-fit=cover — учитываем safe area на iPhone с notch / Dynamic Island
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#212121" media="(prefers-color-scheme: dark)">
  <title>Sushi with Love</title>

  <!-- Telegram Mini App SDK — ОБЯЗАТЕЛЬНО до любых скриптов -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     ЭКРАН 0 — Загрузка
     Показывается пока загружаются данные меню
     ═══════════════════════════════════════════════════ -->
<div id="screen-loading" class="screen active">
  <div class="loading-logo">
    <div class="loading-emoji">🍣</div>
    <div class="loading-title">Sushi with Love</div>
    <div class="loading-subtitle">Доставка суши по Кургану</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     ЭКРАН 1 — Меню
     Главный экран: категории + карточки товаров
     ═══════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen">

  <!-- Шапка: лого + название + иконка корзины -->
  <header class="app-header">
    <div class="header-logo">🍣</div>
    <div class="header-title">Sushi with Love</div>
    <button class="cart-btn" id="cart-btn" onclick="openCartSheet()" aria-label="Корзина">
      <!-- Иконка корзины (SVG inline) -->
      <svg viewBox="0 0 24 24">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </header>

  <!-- Горизонтальный таб-бар категорий (генерируется в JS) -->
  <nav class="categories-nav" id="categories-nav" aria-label="Категории меню"></nav>

  <!-- Список секций с карточками (генерируется в JS) -->
  <main class="menu-content" id="menu-content" role="main"></main>
</div>

<!-- ═══════════════════════════════════════════════════
     ЭКРАН 2 — Адрес доставки
     ═══════════════════════════════════════════════════ -->
<div id="screen-address" class="screen">
  <header class="screen-header">
    <h1>Адрес доставки</h1>
  </header>

  <div class="screen-content">

    <!-- Переключатель Доставка / Самовывоз -->
    <div class="segment-control" role="tablist">
      <button class="seg-btn active" data-type="delivery" role="tab" aria-selected="true">🛵 Доставка</button>
      <button class="seg-btn"        data-type="pickup"   role="tab" aria-selected="false">🏪 Самовывоз</button>
    </div>

    <!-- Блок доставки -->
    <div id="delivery-block">
      <!-- Кнопка геолокации -->
      <div class="form-group">
        <button class="contact-btn" onclick="requestGeoLocation()" style="border-color:rgba(0,0,0,.15);color:var(--tg-text)">
          📍 Определить мой адрес
        </button>
      </div>

      <!-- Улица (с DaData подсказками) -->
      <div class="form-group" style="position:relative">
        <label class="form-label" for="addr-street">Улица</label>
        <input
          id="addr-street"
          class="form-input"
          type="text"
          placeholder="Гоголя, Ленина, Советская..."
          data-placeholder="Гоголя, Ленина, Советская..."
          autocomplete="street-address"
          autocorrect="off"
          spellcheck="false"
          oninput="handleStreetInput(event)"
          onblur="setTimeout(closeDadataSuggestions, 200)"
        >
        <!-- Подсказки DaData вставляются сюда через JS -->
      </div>

      <!-- Дом и квартира -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="addr-house">Дом</label>
          <input id="addr-house" class="form-input" type="text" placeholder="55" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="addr-apt">Кв/офис <span style="opacity:.6">(необяз.)</span></label>
          <input id="addr-apt" class="form-input" type="text" placeholder="12" autocomplete="off">
        </div>
      </div>

      <!-- Информация о зоне (появляется после ввода адреса) -->
      <div id="zone-info" class="delivery-zone-info"></div>
    </div>

    <!-- Блок самовывоза -->
    <div id="pickup-block" style="display:none">
      <div class="pickup-block">
        <div class="pickup-address" id="pickup-address-text"></div>
        <div class="pickup-time" id="pickup-time-text"></div>
        <a class="pickup-map-btn" id="pickup-map-link" target="_blank" rel="noopener">
          🗺 Открыть в картах
        </a>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     ЭКРАН 3 — Детали заказа
     ═══════════════════════════════════════════════════ -->
<div id="screen-details" class="screen">
  <header class="screen-header">
    <h1>Оформление заказа</h1>
  </header>

  <div class="screen-content">

    <!-- Имя -->
    <div class="form-group">
      <label class="form-label" for="det-name">Ваше имя</label>
      <input
        id="det-name"
        class="form-input"
        type="text"
        placeholder="Введите имя"
        autocomplete="given-name"
        autocorrect="off"
      >
    </div>

    <!-- Телефон через requestContact или ввод вручную -->
    <div class="form-group">
      <label class="form-label">Телефон</label>
      <button class="contact-btn" id="contact-btn" onclick="requestContactPhone()">
        📱 Поделиться номером
      </button>
      <div id="phone-input-wrap">
        <input
          id="det-phone"
          class="form-input"
          type="tel"
          placeholder="+7 (xxx) xxx-xx-xx"
          autocomplete="tel"
        >
      </div>
      <!-- Поле ввода телефона вручную (показывается если requestContact не сработал) -->
      <input id="det-phone-manual" class="form-input" type="tel" placeholder="+7 (xxx) xxx-xx-xx" autocomplete="tel" style="margin-top:8px;display:none">
    </div>

    <!-- Способ оплаты -->
    <div class="form-group">
      <label class="form-label">Способ оплаты</label>
      <div class="payment-options" id="payment-options">
        <label class="payment-option" onclick="selectPayment(this,'online')">
          <input type="radio" name="payment" value="online">
          <div class="payment-icon">💳</div>
          <div>
            <div class="payment-label">Онлайн картой</div>
            <div class="payment-desc">Оплата по ссылке от оператора</div>
          </div>
        </label>
        <label class="payment-option selected" onclick="selectPayment(this,'cash')">
          <input type="radio" name="payment" value="cash" checked>
          <div class="payment-icon">💵</div>
          <div>
            <div class="payment-label">Наличные курьеру</div>
            <div class="payment-desc">Приготовьте точную сумму</div>
          </div>
        </label>
        <label class="payment-option" onclick="selectPayment(this,'card')">
          <input type="radio" name="payment" value="card">
          <div class="payment-icon">🖥️</div>
          <div>
            <div class="payment-label">Картой курьеру</div>
            <div class="payment-desc">Терминал у курьера</div>
          </div>
        </label>
      </div>
    </div>

    <!-- Палочки -->
    <div class="form-group">
      <label class="form-label">Палочки для еды</label>
      <div class="chopsticks-row">
        <div>
          <div class="chopsticks-label">🥢 Количество пар</div>
          <div class="chopsticks-hint">Приборы вложат в заказ</div>
        </div>
        <div class="chopsticks-stepper">
          <button class="counter-btn minus sm" onclick="changeChopsticks(-1)">−</button>
          <span class="counter-qty sm" id="chopsticks-count">0</span>
          <button class="counter-btn plus sm" onclick="changeChopsticks(1)">+</button>
        </div>
      </div>
    </div>

    <!-- Комментарий -->
    <div class="form-group">
      <label class="form-label" for="det-comment">Комментарий <span style="opacity:.6">(необяз.)</span></label>
      <textarea
        id="det-comment"
        class="form-textarea"
        placeholder="Позвонить в домофон, без острого, аллергия на..."
        maxlength="300"
      ></textarea>
    </div>

    <!-- Сводка заказа -->
    <div class="section-label">Ваш заказ</div>
    <div id="details-summary"></div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     ЭКРАН 4 — Заказ принят
     ═══════════════════════════════════════════════════ -->
<div id="screen-success" class="screen">
  <div class="success-content">

    <!-- Анимированная галочка -->
    <div class="check-circle" id="check-circle">
      <svg viewBox="0 0 24 24">
        <path class="check-path" d="M5 12l5 5L19 7"/>
      </svg>
    </div>

    <div class="success-title">Заказ принят!</div>
    <div class="success-subtitle" id="success-time">Доставим к ~14:35. Позвоним для подтверждения.</div>
    <div class="success-order">Заказ <span id="success-order-num">#0000</span></div>
    <div class="success-items" id="success-summary"></div>

    <!-- Кнопки -->
    <button class="success-close-btn" onclick="tg?.close() || window.close()">
      Отлично! 👍
    </button>
    <button class="success-share-btn" onclick="shareApp()">
      Поделиться с другом
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     BOTTOM SHEET: Карточка товара
     Открывается поверх меню при тапе на карточку
     ═══════════════════════════════════════════════════ -->
<div id="sheet-product" class="bottom-sheet" role="dialog" aria-label="Информация о товаре">
  <div class="sheet-handle"></div>
  <!-- Контент генерируется в openProductSheet() -->
  <div id="sheet-product-content" class="sheet-scroll"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     BOTTOM SHEET: Корзина
     ═══════════════════════════════════════════════════ -->
<div id="sheet-cart" class="bottom-sheet" role="dialog" aria-label="Корзина">
  <div class="sheet-handle"></div>
  <div class="sheet-cart-header">
    <h2>Корзина</h2>
    <button class="clear-cart-btn" onclick="confirmClearCart()">Очистить</button>
  </div>
  <!-- Контент генерируется в renderCartSheet() -->
  <div id="sheet-cart-content" class="sheet-scroll"></div>
</div>

<!-- Затемнение под шитами -->
<div id="overlay" class="overlay"></div>

<!-- ─── Скрипты ──────────────────────────────────────────────────────────── -->
<!-- Порядок важен: data → cart → app -->
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>

<!-- Вспомогательные функции (не вошедшие в app.js) -->
<script>
  /** Геолокация через браузер (запасной вариант если tg.requestLocation недоступен) */
  function requestGeoLocation() {
    if (tg) {
      try {
        tg.requestLocation((ok, loc) => {
          if (ok && loc) {
            // Здесь можно вызвать reverse geocoding
            showToast('Местоположение определено. Введите улицу и дом.');
          }
        });
        return;
      } catch(e) {}
    }
    // Fallback: browser geolocation
    if (!navigator.geolocation) { showToast('Геолокация не поддерживается'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => showToast('Местоположение определено. Введите улицу и дом.'),
      () => showToast('Не удалось определить адрес. Введите вручную.')
    );
  }

  /** Выбор способа оплаты */
  function selectPayment(label, value) {
    document.querySelectorAll('.payment-option').forEach(l => l.classList.remove('selected'));
    label.classList.add('selected');
    label.querySelector('input').checked = true;
  }

  /** Подтверждение очистки корзины */
  function confirmClearCart() {
    if (tg) {
      tg.showConfirm('Очистить корзину?', (ok) => {
        if (ok) { Cart.clear(); closeSheet('sheet-cart'); updateCartBadge(); updateMainButton(); }
      });
    } else if (confirm('Очистить корзину?')) {
      Cart.clear(); closeSheet('sheet-cart'); updateCartBadge(); updateMainButton();
    }
  }

  /** Поделиться приложением */
  function shareApp() {
    if (tg) {
      try {
        tg.switchInlineQuery('Заказывай суши прямо в Telegram! 🍣', ['users', 'groups']);
        return;
      } catch(e) {}
    }
    showToast('Перешли бота друзьям!');
  }

  /** Инициализация экрана адреса при переходе */
  document.getElementById('screen-address').addEventListener('animationend', () => {
    // Заполнить адрес самовывоза из CONFIG
    const addrEl = document.getElementById('pickup-address-text');
    const timeEl = document.getElementById('pickup-time-text');
    const mapEl  = document.getElementById('pickup-map-link');
    if (addrEl) addrEl.textContent = CONFIG.pickupAddress;
    if (timeEl) timeEl.textContent = 'Время готовности: ' + CONFIG.pickupTime;
    if (mapEl)  mapEl.href = 'https://yandex.ru/maps/?text=' + encodeURIComponent(CONFIG.pickupAddress);
  });

  /** Инициализация экрана деталей при переходе */
  document.getElementById('screen-details').addEventListener('animationend', () => {
    initDetailsScreen();
  });
</script>

</body>
</html>
